<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hà Nguyễn - Game Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: #A8E6EF; 
            background-image: linear-gradient(135deg, #A8E6EF 0%, #76DAE9 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column;
            font-family: 'Quicksand', sans-serif; overflow: hidden; position: relative;
        }
        .container {
            text-align: center; z-index: 10; background: rgba(255, 255, 255, 0.6); 
            padding: 15px 12px; border-radius: 24px; backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px 0 rgba(118, 218, 233, 0.3); border: 1px solid rgba(255, 255, 255, 0.7);
            width: 95%; max-width: 420px; margin: 5px; position: relative;
        }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.1rem; color: #006D77; margin: 5px 0 10px 0; }
        .info-box {
            margin: 8px auto; min-height: 45px; display: flex; justify-content: center; align-items: center;
            font-size: 0.9rem; font-weight: 700; color: #006D77; padding: 5px 10px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.7); border: 1px dashed #76DAE9; text-align: center;
        }
        .music-btn {
            padding: 10px 20px; background-color: #006D77; color: white; border: none; border-radius: 20px;
            font-size: 0.9rem; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 4px 10px rgba(0, 109, 119, 0.2);
            -webkit-tap-highlight-color: transparent; margin-bottom: 10px;
        }
        .back-btn {
            background: #ff758f; color: white; border: none; padding: 6px 12px; border-radius: 15px;
            font-weight: bold; font-size: 0.8rem; cursor: pointer; display: none; margin: 0 auto 8px auto;
        }

        /* --- MENU STYLE --- */
        #game-menu { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .menu-btn {
            background: #ffffff; color: #006D77; border: 2px solid #006D77; border-radius: 16px;
            padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .menu-btn:active { background: #006D77; color: white; }
        .menu-btn span { font-size: 1.4rem; }

        /* --- SCREEN MANAGEMENT --- */
        .game-screen { display: none; width: 100%; }
        .active-screen { display: block; }

        /* --- GAME 1: MEMORY MATCH (ĐÃ SỬA LỖI HIỂN THỊ) --- */
        #memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px auto; max-width: 320px; }
        .card {
            aspect-ratio: 1; background: #006D77; border-radius: 10px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: transparent;
            transition: transform 0.2s; border: 2px solid white;
        }
        /* Sửa lỗi hiển thị chữ/icon khi lật thẻ */
        .card.flipped { background: #ffffff; color: #000000 !important; transform: rotateY(180deg); }
        .card.matched { background: #E8F8F5; color: #000000 !important; opacity: 0; visibility: hidden; }

        /* --- GAME 2 & 3: CANVAS GAMES (ĐÃ SỬA KÍCH THƯỚC GIỎ) --- */
        canvas { background: #ffffff; border: 4px solid #006D77; border-radius: 12px; display: block; margin: 0 auto; }
        .btn-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .action-btn {
            background: #76DAE9; color: #006D77; border: none; padding: 10px 25px; font-size: 1.1rem;
            font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 45%; -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { background: #006D77; color: white; }

        /* --- TULIP BACKGROUND EFFECT --- */
        .tulip { position: absolute; font-size: 24px; pointer-events: none; opacity: 0; z-index: 1; }
        .music-on .tulip { animation: floatTulip 8s infinite linear; }
        @keyframes floatTulip {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.85; }
            90% { opacity: 0.85; }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="back-btn" id="backBtn" onclick="showMenu()">↩ QUAY LẠI MENU</button>
        <h1 id="mainTitle">Hà Nguyễn Game Center</h1>
        
        <!-- Khung Nhạc Nền -->
        <div class="info-box" id="infoDisplay">🌷 Nhấn nút dưới để mở nhạc ngẫu nhiên 🌷</div>
        <button class="music-btn" id="playBtn" onclick="toggleMusic()">🌷 BẬT NHẠC NỀN 🌷</button>

        <!-- ================= MENU CHÍNH ================= -->
        <div id="game-menu" class="game-screen active-screen">
            <button class="menu-btn" onclick="startMemoryGame()">
                <span>🧩</span> <b>Trò chơi 1:</b> Lật Thẻ Tìm Cặp
            </button>
            <button class="menu-btn" onclick="startCatchGame()">
                <span>🧺</span> <b>Trò chơi 2:</b> Hứng Tim & Tulip
            </button>
            <button class="menu-btn" onclick="startJumpGame()">
                <span>🏃‍♀️</span> <b>Trò chơi 3:</b> Nhảy Né Vật Cản
            </button>
        </div>

        <!-- ================= TRÒ CHƠI 1: LẬT THẺ ================= -->
        <div id="screen-memory" class="game-screen">
            <div id="memory-score" style="font-weight:bold; color:#006D77; margin-bottom:5px;">Cặp đã tìm: 0/6</div>
            <div id="memory-grid"></div>
        </div>

        <!-- ================= TRÒ CHƠI 2: HỨNG VẬT PHẨM (ĐÃ CO KHUNG KHÔNG BỊ KHUẤT GIỎ) ================= -->
        <div id="screen-catch" class="game-screen">
            <div style="font-weight:bold; color:#006D77; margin-bottom:5px;" id="catchScore">Điểm số: 0/20</div>
            <!-- Hạ chiều cao canvas từ 320 xuống 260 chống khuất đáy -->
            <canvas id="catchCanvas" width="320" height="260"></canvas>
            <div class="btn-row">
                <button class="action-btn" ontouchstart="moveBasket(-35); e.preventDefault();" onclick="moveBasket(-35)">◀ TRÁI</button>
                <button class="action-btn" ontouchstart="moveBasket(35); e.preventDefault();" onclick="moveBasket(35)">PHẢI ▶</button>
            </div>
        </div>

        <!-- ================= TRÒ CHƠI 3: JUMP RUNNER ================= -->
        <div id="screen-jump" class="game-screen">
            <div style="font-weight:bold; color:#006D77; margin-bottom:5px;" id="jumpScore">Điểm số: 0/15</div>
            <canvas id="jumpCanvas" width="320" height="180"></canvas>
            <div class="btn-row">
                <button class="action-btn" style="width:100%" ontouchstart="triggerJump(); e.preventDefault();" onclick="triggerJump()">▲ NHẢY LÊN ▲</button>
            </div>
        </div>

    </div>

    <audio id="bgMusic" loop preload="auto" playsinline webkit-playsinline></audio>

    <script>
        const audio = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        const infoDisplay = document.getElementById('infoDisplay');
        const backBtn = document.getElementById('backBtn');
        const mainTitle = document.getElementById('mainTitle');

        const playlist = [
            { src: "duchomaivesau.mp3", title: "🎵 Đang phát: Dù Cho Mai Về Sau" },
            { src: "giothi.mp3", title: "🎵 Đang phát: Giờ Thì" },
            { src: "emkhongkhoc.mp3", title: "🎵 Đang phát: Em Không Khóc" },
            { src: "duongtoichoemve.mp3", title: "🎵 Đang phát: Đường Tôi Chở Em Về" }
        ];
        let currentSong = null;
        let activeGameLoop = null;

        function pickRandomSong() {
            const randomIndex = Math.floor(Math.random() * playlist.length);
            currentSong = playlist[randomIndex];
            audio.src = currentSong.src;
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerText = "🎵 Tắt Nhạc Nền";
                    playBtn.style.backgroundColor = "#76DAE9"; playBtn.style.color = "#006D77";
                    infoDisplay.innerText = currentSong.title;
                    document.body.classList.add('music-on');
                }).catch(() => { audio.play(); document.body.classList.add('music-on'); });
            } else {
                audio.pause();
                playBtn.innerText = "🎵 Bật Nhạc Nền";
                playBtn.style.backgroundColor = "#006D77"; playBtn.style.color = "white";
                document.body.classList.remove('music-on');
            }
        }

        function switchScreen(screenId, titleText) {
            if (activeGameLoop) { cancelAnimationFrame(activeGameLoop); activeGameLoop = null; }
            document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            mainTitle.innerText = titleText;
            backBtn.style.display = screenId === 'game-menu' ? 'none' : 'block';
        }

        function showMenu() { switchScreen('game-menu', 'Hà Nguyễn Game Center'); }

        window.addEventListener('DOMContentLoaded', () => {
            audio.volume = 0.85; pickRandomSong(); createTulips();
        });

        // ================= TRÒ CHƠI 1: LẬT THẺ BIẾN MẤT =================
        let memoryIcons = ['🌷','🌷','❤️','❤️','🏸','🏸','🍦','🍦','🎵','🎵','✈️','✈️'];
        let flippedCards = [];
        let matchedPairs = 0;

        function startMemoryGame() {
            switchScreen('screen-memory', '🧩 Lật Thẻ Tìm Cặp');
            const grid = document.getElementById('memory-grid');
            grid.innerHTML = ''; flippedCards = []; matchedPairs = 0;
            document.getElementById('memory-score').innerText = "Cặp đã tìm: 0/6";
            
            memoryIcons.sort(() => Math.random() - 0.5);
            memoryIcons.forEach((icon, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.icon = icon;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (flippedCards.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            card.innerText = card.dataset.icon;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 500);
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.icon === c2.dataset.icon) {
                c1.classList.add('matched'); c2.classList.add('matched');
                matchedPairs++;
                document.getElementById('memory-score').innerText = `Cặp đã tìm: ${matchedPairs}/6`;
                if (matchedPairs === 6) {
                    document.getElementById('memory-score').innerText = "🎉 Xuất sắc! Bạn đã chiến thắng! 💕";
                }
            } else {
                c1.classList.remove('flipped'); c2.classList.remove('flipped');
                c1.innerText = ''; c2.innerText = '';
            }
            flippedCards = [];
        }

        // ================= TRÒ CHƠI 2: HỨNG TIM & TULIP =================
        const catchCanvas = document.getElementById('catchCanvas');
        const catchCtx = catchCanvas.getContext('2d');
        let basketX, items, catchScore, isCatchGameOver;

        function startCatchGame() {
            switchScreen('screen-catch', '🧺 Hứng Tim & Tulip');
            basketX = 135; items = []; catchScore = 0; isCatchGameOver = false;
            document.getElementById('catchScore').innerText = "Điểm số: 0/20";
            runCatchGame();
        }

        function moveBasket(dir) { basketX = Math.max(0, Math.min(265, basketX + dir)); }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveBasket(-30);
            if (e.key === 'ArrowRight') moveBasket(30);
        });

        function runCatchGame() {
            if (isCatchGameOver) return;
            catchCtx.clearRect(0, 0, 320, 260); // Đã đồng bộ dọn khung theo chiều cao mới

            if (Math.random() < 0.035) {
                let rand = Math.random();
                let type = rand < 0.45 ? '❤️' : (rand < 0.85 ? '🌷' : '🌧️');
                items.push({ x: Math.random() * 280 + 15, y: 0, type: type });
            }

            // Vẽ giỏ hứng (Đã kéo lên vị trí y = 235 cực chuẩn)
            catchCtx.fillStyle = '#006D77';
            catchCtx.fillRect(basketX, 235, 55, 20);
            catchCtx.fillStyle = '#ffffff';
            catchCtx.font = 'bold 12px Quicksand';
            catchCtx.textAlign = 'left';
            catchCtx.textBaseline = 'top';
            catchCtx.fillText('HN 🌸', basketX + 8, 238);

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y += 3; 

                catchCtx.font = '22px Arial';
                catchCtx.textAlign = 'center';
                catchCtx.textBaseline = 'middle';
                catchCtx.fillText(it.type, it.x, it.y);

                // Kiểm tra va chạm giỏ hứng ở trục Y mới
                if (it.y >= 225 && it.y <= 255 && it.x >= basketX - 10 && it.x <= basketX + 65) {
                    if (it.type === '🌧️') {
                        catchScore = Math.max(0, catchScore - 2);
                    } else {
                        catchScore++;
                    }
                    document.getElementById('catchScore').innerText = `Điểm số: ${catchScore}/20`;
                    items.splice(i, 1);
                    
                    if (catchScore >= 20) {
                        isCatchGameOver = true;
                        document.getElementById('catchScore').innerText = "🎉 Tuyệt vời! Bạn đã hứng trọn tình yêu! 💕";
                    }
                    continue;
                }

                if (it.y > 260) items.splice(i, 1);
            }

            if (!isCatchGameOver) activeGameLoop = requestAnimationFrame(runCatchGame);
        }

        // ================= TRÒ CHƠI 3: JUMP RUNNER =================
        const jumpCanvas = document.getElementById('jumpCanvas');
        const jumpCtx = jumpCanvas.getContext('2d');
        let playerY, playerVelocity, obstacles, jumpScore, isJumpGameOver, jumpTimer;

        function startJumpGame() {
            switchScreen('screen-jump', '🏃‍♀️ Nhảy Né Vật Cản');
            playerY = 140; playerVelocity = 0; obstacles = []; jumpScore = 0; isJumpGameOver = false; jumpTimer = 0;
            document.getElementById('jumpScore').innerText = "Điểm số: 0/15";
            runJumpGame();
        }

        function triggerJump() { if (playerY === 140) { playerVelocity = -9.5; } }

        window.addEventListener('keydown', (e) => { if (e.key === ' ' || e.key === 'ArrowUp') triggerJump(); });

        function runJumpGame() {
            if (isJumpGameOver) return;
            jumpCtx.clearRect(0, 0, 320, 180);

            jumpCtx.strokeStyle = '#006D77'; jumpCtx.lineWidth = 3;
            jumpCtx.beginPath(); jumpCtx.moveTo(0, 160); jumpCtx.lineTo(320, 160); jumpCtx.stroke();

            playerY += playerVelocity;
            playerVelocity += 0.55; 
            if (playerY >= 140) { playerY = 140; playerVelocity = 0; }

            jumpCtx.beginPath();
            jumpCtx.arc(35, playerY + 10, 10, 0, 2 * Math.PI);
            jumpCtx.fillStyle = '#76DAE9'; jumpCtx.fill();
            jumpCtx.lineWidth = 2; jumpCtx.strokeStyle = '#00464F'; jumpCtx.stroke();
            jumpCtx.fillStyle = '#006D77'; jumpCtx.font = 'bold 9px Quicksand';
            jumpCtx.textAlign = 'center'; jumpCtx.textBaseline = 'middle';
            jumpCtx.fillText('HN', 35, playerY + 11);

            jumpTimer++;
            if (jumpTimer % 95 === 0) { obstacles.push({ x: 320, width: 15, height: 20 }); }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                ob.x -= 3.8; 

                jumpCtx.fillStyle = '#FF5E7E';
                jumpCtx.fillRect(ob.x, 160 - ob.height, ob.width, ob.height);

                if (ob.x <= 45 && ob.x >= 15 && playerY >= (160 - ob.height - 15)) {
                    isJumpGameOver = true;
                    document.getElementById('jumpScore').innerText = "💥 Ôi! Hãy ấn Thử Lại hoặc đổi trò chơi nha!";
                    setTimeout(startJumpGame, 1800);
                    break;
                }

                if (ob.x < -20) {
                    obstacles.splice(i, 1);
                    jumpScore++;
                    document.getElementById('jumpScore').innerText = `Điểm số: ${jumpScore}/15`;
                    if (jumpScore >= 15) {
                        isJumpGameOver = true;
                        document.getElementById('jumpScore').innerText = "🎉 Đỉnh quá Hà Nguyễn ơi! Bạn đã chiến thắng! 💕";
                    }
                }
            }

            if (!isJumpGameOver) activeGameLoop = requestAnimationFrame(runJumpGame);
        }

        // --- HIỆU ỨNG HOA TULIP TRẮNG NỀN ---
        function createTulips() {
            const body = document.body;
            for (let i = 0; i < 12; i++) {
                let tulip = document.createElement('div');
                tulip.classList.add('tulip'); tulip.innerText = "🌷";
                tulip.style.filter = "brightness(0) invert(1) drop-shadow(0px 2px 3px rgba(0,0,0,0.15))";
                tulip.style.left = Math.random() * 100 + 'vw';
                tulip.style.animationDuration = Math.random() * 4 + 6 + 's';
                tulip.style.animationDelay = Math.random() * 6 + 's';
                body.appendChild(tulip);
            }
        }
    </script>
</body>
</html>
