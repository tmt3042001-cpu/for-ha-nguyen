<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Hà Nguyễn</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Toàn bộ bảng màu được trích xuất từ hình ảnh bạn gửi */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #A8E6EF; /* Màu xanh nền chính (sáng và tươi) */
            background-image: linear-gradient(135deg, #A8E6EF 0%, #76DAE9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.5); /* Tăng độ trong suốt để nền xanh nổi bật */
            padding: 30px 20px;
            border-radius: 24px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px 0 rgba(118, 218, 233, 0.3); /* Shadow màu xanh */
            border: 1px solid rgba(255, 255, 255, 0.7);
            width: 90%;
            max-width: 450px;
            margin: 10px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: calc(2rem + 3vw);
            color: #006D77; /* Màu văn bản đậm hơn để tương phản tốt */
            margin: 15px 0;
            word-wrap: break-word;
            line-height: 1.3;
        }

        .karaoke-box {
            margin: 20px auto;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #006D77; /* Màu lời nhạc */
            padding: 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px dashed #76DAE9; /* Border màu xanh sáng */
            transition: all 0.3s ease;
        }

        .active-lyric {
            color: #00464F; /* Màu chữ active khi hát đến */
            font-size: 1.2rem;
            animation: pulseText 0.5s ease-in-out;
        }

        .tulip-container {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .tulip {
            position: relative;
            width: 35px;
            height: 100px;
        }

        .flower {
            width: 35px;
            height: 40px;
            background-color: #A8E6EF; /* Màu hoa chính (trùng với nền) */
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            box-shadow: inset 2px -2px 8px rgba(255,255,255,0.6);
        }

        .flower::before {
            content: '';
            position: absolute;
            left: 11px;
            width: 13px;
            height: 36px;
            background-color: #76DAE9; /* Màu cánh hoa trong */
            border-radius: 50%;
        }

        .stem {
            width: 3.5px;
            height: 60px;
            background-color: #9DBEB7; /* Màu thân và lá giữ nguyên sự tự nhiên */
            margin: 0 auto;
        }

        .leaf {
            position: absolute;
            width: 14px;
            height: 30px;
            background-color: #9DBEB7;
            border-radius: 100% 0% 100% 0%;
            top: 55px;
            left: 17px;
            transform: rotate(15deg);
        }

        .leaf.left {
            border-radius: 0% 100% 0% 100%;
            left: 5px;
            transform: rotate(-35deg);
        }

        .music-btn {
            margin-top: 15px;
            padding: 12px 28px;
            background-color: #006D77; /* Màu nút bấm (đậm hơn để nổi bật) */
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 109, 119, 0.3);
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            width: 100%;
            animation: pulseBtn 2s infinite;
            -webkit-tap-highlight-color: transparent; 
        }

        .petal {
            position: absolute;
            background-color: rgba(168, 230, 239, 0.45); /* Cánh hoa rơi màu xanh bạn gửi */
            border-radius: 100% 0 100% 0;
            animation: float 7s infinite linear;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) translateX(80px) rotate(360deg); opacity: 0; }
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @keyframes pulseText {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tulip-container">
            <div class="tulip" style="transform: rotate(-10deg);">
                <div class="flower"></div>
                <div class="stem"></div>
                <div class="leaf left"></div>
            </div>
            <div class="tulip" style="transform: translateY(-8px);">
                <div class="flower" style="background-color: #76DAE9;"></div>
                <div class="stem"></div>
                <div class="leaf"></div>
            </div>
            <div class="tulip" style="transform: rotate(10deg);">
                <div class="flower"></div>
                <div class="stem"></div>
                <div class="leaf left"></div>
            </div>
        </div>

        <h1>Yêu cục cưng Hà Nguyễn</h1>
        
        <div class="karaoke-box" id="lyricDisplay">✨ Đang chờ món quà nhỏ... ✨</div>
        
        <button class="music-btn" id="playBtn" onclick="toggleMusic()">🌸 Nhấn vào đây để mở quà nha 🌸</button>
    </div>

    <audio id="bgMusic" loop preload="auto" playsinline webkit-playsinline>
        <source src="https://files.catbox.moe/6w705z.mp3" type="audio/mp3">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        const lyricDisplay = document.getElementById('lyricDisplay');

        const lyrics = [
            { time: 0, text: "🎵 Dù Cho Mai Về Sau - Bùi Trường Linh 🎵" },
            { time: 10, text: "Đoạn đường dài phía trước, con đường mình sẽ bước..." },
            { time: 15, text: "Liệu có bao giờ anh nhìn lại và nhớ em?" },
            { time: 22, text: "Những kỷ niệm êm đềm, ta đã cùng bên nhau..." },
            { time: 28, text: "Giờ đây tan thành mây khói, bay về trời." },
            { time: 34, text: "Dù cho mai về sau, mình già cỗi hóa mây trời..." },
            { time: 41, text: "Anh vẫn muốn bên em, ngắm nhìn thế gian ngoài kia rộng lớn." },
            { time: 48, text: "Dù thế giới đổi thay, lòng này chẳng hề lay chuyển..." },
            { time: 54, text: "Nguyện trọn kiếp yêu em, đến tận cùng của thời gian." },
            { time: 61, text: "Yêu cục cưng Hà Nguyễn nhất trên đời! 💕" }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            audio.volume = 0.85;
            createPetals();
            
            setTimeout(() => {
                if(audio.paused) {
                    lyricDisplay.innerText = "🌸 Chạm nút bên dưới để phát nhạc nha 🌸";
                }
            }, 1000);

            audio.addEventListener('timeupdate', () => {
                const currentTime = audio.currentTime;
                let currentText = lyrics[0].text;
                
                for (let i = 0; i < lyrics.length; i++) {
                    if (currentTime >= lyrics[i].time) {
                        currentText = lyrics[i].text;
                    }
                }
                
                if (lyricDisplay.innerText !== currentText) {
                    lyricDisplay.innerText = currentText;
                    lyricDisplay.classList.add('active-lyric');
                    setTimeout(() => {
                        lyricDisplay.classList.remove('active-lyric');
                    }, 400);
                }
            });
        });

        function toggleMusic() {
            if (audio.paused) {
                audio.load(); 
                let playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        playBtn.innerText = "🎵 Tắt Nhạc";
                        playBtn.style.backgroundColor = "#A8E6EF";
                        playBtn.style.color = "#006D77";
                        playBtn.style.animation = "none";
                    }).catch(err => {
                        audio.play();
                        playBtn.innerText = "🎵 Tắt Nhạc";
                    });
                }
            } else {
                audio.pause();
                playBtn.innerText = "🎵 Tiếp Tục Phát";
                playBtn.style.backgroundColor = "#006D77";
                playBtn.style.color = "white";
            }
        }

        function createPetals() {
            const body = document.body;
            for (let i = 0; i < 15; i++) { /* Tăng số lượng cánh hoa */
                let petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 14 + 10 + 'px';
                petal.style.height = Math.random() * 20 + 12 + 'px';
                petal.style.animationDuration = Math.random() * 4 + 6 + 's';
                petal.style.animationDelay = Math.random() * 4 + 's';
                body.appendChild(petal);
            }
        }
    </script>
</body>
</html>
